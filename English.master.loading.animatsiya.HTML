<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <title>Header preview — tuzatilgan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    body {
      margin: 0;
      background: #0b1020;
      font-family: system-ui, sans-serif;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: rgba(13, 17, 34, .72);
      box-shadow: 0 5px 20px rgba(0, 0, 0, .35);
      position: relative;
    }

    header::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #22d3ee, #a855f7, transparent);
      opacity: .55;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-weight: 700;
      font-size: 20px;
      background: linear-gradient(90deg, #22d3ee, #6366f1, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo i {
      color: #22d3ee;
      -webkit-text-fill-color: #22d3ee;
      filter: drop-shadow(0 0 8px rgba(34, 211, 238, .5));
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .quick-theme-btn {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .1);
      background: rgba(255, 255, 255, .055);
      cursor: pointer;
    }

    .burger-btn {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 30px;
      height: 22px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
    }

    .burger-btn span {
      display: block;
      height: 3px;
      width: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #22d3ee, #a855f7);
    }

    .hint {
      color: #94a3b8;
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <div class="logo"><i class="fa-solid fa-graduation-cap"></i>English Master AI</div>
    <div class="header-actions">
      <button class="quick-theme-btn">🌙</button>
      <button class="burger-btn" title="Menyu"><span></span><span></span><span></span></button>
    </div>
  </header>
  <p class="hint">✅ Endi 🌙 va ☰ bir-biriga yopishib, birga o'ng burchakda turadi.</p>
</body>

</html>
